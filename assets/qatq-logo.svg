    <circle cx="105" cy="24" r="12" fill="#f1b24a"/>
    <circle cx="186" cy="105" r="12" fill="#f1b24a"/>
    <circle cx="105" cy="186" r="12" fill="#f1b24a"/>
    <circle cx="24" cy="105" r="12" fill="#f1b24a"/>
