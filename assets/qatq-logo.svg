  <text x="505" y="154" fill="#f7fbff" font-family="Inter, Arial, sans-serif" font-size="92" font-weight="700" letter-spacing="0">QATQ</text>
  <text x="510" y="202" fill="#93a4b8" font-family="Inter, Arial, sans-serif" font-size="28" letter-spacing="0">exact tensor compression</text>
