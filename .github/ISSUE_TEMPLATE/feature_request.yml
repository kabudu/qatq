name: Feature Request
description: Propose a scoped QATQ feature or integration.
title: "[feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What concrete workflow does this unblock?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the API, CLI, codec, documentation, or benchmark change.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence Or Acceptance Criteria
      description: What test, fixture, benchmark, or runtime evidence should prove this works?
    validations:
      required: true
